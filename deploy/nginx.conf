# Martvill / Laravel ecommerce — Nginx site config
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/ecommerce5
#   sudo ln -sf /etc/nginx/sites-available/ecommerce5 /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Edit server_name, root, and fastcgi_pass for your server.

server {
    listen 80;
    listen [::]:80;

    server_name localhost ecommerce5.test;
    # Document root must be the public/ folder
    root /home/tasherul/Documents/GitHub/ecommerce5/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 64M;

    # Logs (adjust paths as needed)
    access_log /var/log/nginx/ecommerce5-access.log;
    error_log  /var/log/nginx/ecommerce5-error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        # Alternative: fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 300;
        fastcgi_hide_header X-Powered-By;
    }

    # Static assets — long cache for versioned build files
    location ~* \.(?:css|js|jpg|jpeg|gif|png|webp|svg|ico|woff2?|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Block hidden files and sensitive extensions
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* \.(?:env|log|sql|bak|ini|sh)$ {
        deny all;
    }
}

